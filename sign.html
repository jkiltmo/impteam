<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8" />
<title>Signage Tool — AltText QR Patch (4 templates)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
body {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  font-family: Arial, system-ui, -apple-system, "Segoe UI", Roboto;
  background: #1789e0;
  color: #ffffff;
}
.wrap {
  max-width: 980px;
  margin: 0 auto;
  padding: 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
}
label { display:block; margin-top:12px; font-weight:600; }
input, textarea, select {
  width:100%; padding:8px; margin-top:6px;
  border-radius:6px;
}
.previewBox {
  margin-top: 8px;
  background: #fff;
  border-radius: 6px;
  height: 420px;
}
.previewBox iframe { width:100%; height:100%; border:none; }
</style>

<script src="https://unpkg.com/pizzip@3.1.6/dist/pizzip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body>
<div class="wrap">
<h1>Signage Tool</h1>

<label>Saved Templates</label>
<select id="templateSelect">
<option value="">— Choose —</option>
<option value="https://docs.google.com/document/d/1jiaGXQfgBXGHl2iCED9DTgWHITVd1Apv/export?format=docx">Hands with email</option>
<option value="https://docs.google.com/document/d/1Ki5Sgj217pq_mTxa8WDnFspMUSJMvezr/export?format=docx">Hands no email</option>
<option value="https://docs.google.com/document/d/1yzuowkHSzqc5St-442thUCjm10JoTRGz/export?format=docx">Vials with email</option>
<option value="https://docs.google.com/document/d/1eTiYb1Fz_IdCcKIa8sy4lOn-h3QoiLxk/export?format=docx">Vials no email</option>
</select>

<label>Template Preview</label>
<div class="previewBox">
<iframe id="templatePreview"></iframe>
</div>

<label>Customer Name</label>
<input id="customerInput" type="text" />

<label>Email</label>
<input id="emailInput" type="text" />

<label>Stockrooms</label>
<textarea id="stockroomInput"></textarea>

<label>QR 1</label>
<input id="qr1" type="file" accept="image/png" />

<label>QR 2</label>
<input id="qr2" type="file" accept="image/png" />

<button id="runBtn">Generate</button>
</div>

<script>
const TEMPLATE_PREVIEWS = {
"https://docs.google.com/document/d/1jiaGXQfgBXGHl2iCED9DTgWHITVd1Apv/export?format=docx":
"https://docs.google.com/document/d/1jiaGXQfgBXGHl2iCED9DTgWHITVd1Apv/preview",

"https://docs.google.com/document/d/1Ki5Sgj217pq_mTxa8WDnFspMUSJMvezr/export?format=docx":
"https://docs.google.com/document/d/1Ki5Sgj217pq_mTxa8WDnFspMUSJMvezr/preview",

"https://docs.google.com/document/d/1yzuowkHSzqc5St-442thUCjm10JoTRGz/export?format=docx":
"https://docs.google.com/document/d/1yzuowkHSzqc5St-442thUCjm10JoTRGz/preview",

"https://docs.google.com/document/d/1eTiYb1Fz_IdCcKIa8sy4lOn-h3QoiLxk/export?format=docx":
"https://docs.google.com/document/d/1eTiYb1Fz_IdCcKIa8sy4lOn-h3QoiLxk/preview"
};

document.getElementById('templateSelect').addEventListener('change', () => {
const url = document.getElementById('templateSelect').value;
document.getElementById('templatePreview').src = TEMPLATE_PREVIEWS[url] || "";
});

async function loadTemplateArrayBuffer(){
const url = document.getElementById('templateSelect').value;
if(!url) throw new Error('Pick template');
const res = await fetch(url);
return await res.arrayBuffer();
}

document.getElementById('runBtn').onclick = async () => {
const tpl = await loadTemplateArrayBuffer();
console.log("Template loaded", tpl.byteLength);
};
</script>

</body>
</html>
