<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIN Filler</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
    :root {
      --accent: #0b72ff;
      --card-bg: #ffffff;
      --text-color: #000000;
    }

    body {
      font-family: Arial, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #1789e0;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .top-banner {
      position: sticky;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 9999;
      background: var(--card-bg, #ffffff);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 8px 0;
      margin-bottom: 20px;
    }

    .top-nav {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      gap: 18px;
      padding: 6px 16px;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      flex-wrap: wrap;
    }

    .top-nav .nav-link {
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      color: var(--text-color, #000);
      opacity: 0.9;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .top-nav .nav-link.active {
      background: var(--accent, #0b72ff);
      color: #fff;
      box-shadow: 0 4px 14px rgba(11,114,255,0.18);
      transform: translateY(-1px);
    }

    .top-nav .nav-link:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section {
      background: rgba(255,255,255,0.03);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    h1, h2 {
      color: #ffffff;
      margin: 0 0 8px 0;
    }

    p {
      margin: 0 0 16px;
      color: #ffffff;
      line-height: 1.4;
    }

    .input-area, textarea, input[type="text"], input[type="file"] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.08);
      background: #ffffff;
      color: #111;
      box-sizing: border-box;
      font-size: 14px;
      min-height: 150px;
    }

    textarea {
      min-height: 320px;
      resize: vertical;
      line-height: 1.4;
    }

    #status {
      margin: 10px 0;
      padding: 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.09);
      color: #ffffff;
    }

    .success {
      background: rgba(255,255,255,0.06);
      color: #eaf6ff;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
    }

    .button {
      display: inline-block;
      background: #f3f6fb;
      color: #111;
      padding: 10px 20px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      text-align: center;
      margin: 5px 0;
    }

    .button:hover {
      background: #e7ecf5;
    }

    .button:disabled,
    .button[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .hint {
      font-size: 13px;
      color: #eaf6ff;
      margin-top: 10px;
    }

    @media (max-width: 760px) {
      .section { padding: 14px; }
    }
  </style>
</head>
<body>
  <header class="top-banner" role="banner">
    <nav class="top-nav" role="navigation" aria-label="Main">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="child.html">Child</a>
      <a class="nav-link" href="sign.html">Sign</a>
      <a class="nav-link" href="RGNBilling.html">RGN Billing</a>
      <a class="nav-link" href="CRLBilling.html">CRL Billing</a>
    </nav>
  </header>
  <script>
  (function(){
    try {
      const links = document.querySelectorAll('.top-banner .nav-link');
      const path = location.pathname.split('/').pop() || 'index.html';
      links.forEach(a => {
        const target = a.getAttribute('href');
        if (target === path) {
          a.classList.add('active');
          a.setAttribute('aria-current', 'page');
        }
      });
    } catch (e) { console.warn(e); }
  })();
  </script>
  <div class="wrap">
    <div class="section">
      <h1>BIN Tool</h1>
      <p>Paste one BIN per line, then click the button to download the file.</p>
      <textarea id="input" placeholder="One BIN per line"></textarea>
      <div>
        <button id="go">Download</button>
      </div>
      <div class="status" id="status"></div>
      <div class="hint"></div>
    </div>
  </div>

    const NS = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main';
    const input = document.getElementById('input');
    const go = document.getElementById('go');
    const status = document.getElementById('status');

    const parser = new DOMParser();
    const serializer = new XMLSerializer();

    const DEFAULT_FONT_SIZE_PT = 26;

    function setRunFontSize(runNode, sizePt) {
      const sizeHalfPoints = String(Math.round(sizePt * 2));
      let rPr = runNode.getElementsByTagNameNS(NS, 'rPr')[0];
      if (!rPr) {
        rPr = runNode.ownerDocument.createElementNS(NS, 'w:rPr');
        runNode.insertBefore(rPr, runNode.firstChild);
      }
      const existingSz = rPr.getElementsByTagNameNS(NS, 'sz')[0];
      if (existingSz) existingSz.setAttributeNS(NS, 'w:val', sizeHalfPoints);
      else {
        const sz = runNode.ownerDocument.createElementNS(NS, 'w:sz');
        sz.setAttributeNS(NS, 'w:val', sizeHalfPoints);
        rPr.appendChild(sz);
      }
      const existingSzCs = rPr.getElementsByTagNameNS(NS, 'szCs')[0];
      if (existingSzCs) existingSzCs.setAttributeNS(NS, 'w:val', sizeHalfPoints);
      else {
        const szCs = runNode.ownerDocument.createElementNS(NS, 'w:szCs');
        szCs.setAttributeNS(NS, 'w:val', sizeHalfPoints);
        rPr.appendChild(szCs);
      }
    }

    function forceFontSize(docNode, sizePt) {
      const runs = docNode.getElementsByTagNameNS(NS, 'r');
      for (let i = 0; i < runs.length; i++) {
        setRunFontSize(runs[i], sizePt);
      }
    }

    function linesFromText(text) {
      return text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
    }

    function xmlStringToDoc(xmlString) {
      return parser.parseFromString(xmlString, 'application/xml');
    }

    function getTemplateBlob() {
      const bin = atob(TEMPLATE_B64);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return new Blob([arr], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    }

    function fillTable(tableNode, values) {
      const texts = tableNode.getElementsByTagNameNS(NS, 't');
      for (let i = 0; i < texts.length; i++) {
        texts[i].textContent = values[i] ?? '';
      }
    }

    async function makeDocx() {
      const lines = linesFromText(input.value);
      const btn = go;
      btn.disabled = true;
      status.textContent = 'Creating DOCX...';

      try {
        if (typeof JSZip === 'undefined') throw new Error('JSZip did not load. Check your internet connection.');

        const blob = getTemplateBlob();
        const zip = await JSZip.loadAsync(blob);
        const xmlText = await zip.file('word/document.xml').async('string');
        const xmlDoc = xmlStringToDoc(xmlText);
        const parseError = xmlDoc.getElementsByTagName('parsererror')[0];
        if (parseError) throw new Error('Could not read the template DOCX XML.');

        const body = xmlDoc.getElementsByTagNameNS(NS, 'body')[0];
        const children = Array.from(body.children);
        const table = children.find(el => el.localName === 'tbl');
        const sectPr = children.find(el => el.localName === 'sectPr');
        if (!table || !sectPr) throw new Error('Template structure was not found.');

        const perPage = table.getElementsByTagNameNS(NS, 't').length;
        if (!perPage) throw new Error('No BIN placeholders were found in the template.');

        const pageCount = Math.max(1, Math.ceil(lines.length / perPage));
        const newBody = xmlDoc.createElementNS(NS, 'w:body');

        for (let p = 0; p < pageCount; p++) {
          const clone = table.cloneNode(true);
          const chunk = lines.slice(p * perPage, (p + 1) * perPage);
          fillTable(clone, chunk);
          forceFontSize(clone, DEFAULT_FONT_SIZE_PT);
          newBody.appendChild(clone);
        }

        newBody.appendChild(sectPr.cloneNode(true));
        body.parentNode.replaceChild(newBody, body);

        const newXml = serializer.serializeToString(xmlDoc);
        zip.file('word/document.xml', newXml);
        const out = await zip.generateAsync({ type: 'blob' });

        const a = document.createElement('a');
        a.href = URL.createObjectURL(out);
        a.download = 'BIN filled.docx';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);

        status.textContent = `Done. Created ${pageCount} page${pageCount === 1 ? '' : 's'} from ${lines.length} line${lines.length === 1 ? '' : 's'}.`;
      } catch (err) {
        console.error(err);
        status.textContent = 'Error: ' + (err && err.message ? err.message : String(err));
      } finally {
        btn.disabled = false;
      }
    }

    go.addEventListener('click', makeDocx);
    input.value = '';
  </script>
