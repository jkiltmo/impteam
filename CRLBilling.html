<!doctype html>

<head>
  <meta charset="utf-8" />

  <title>CRL Billing</title>
  <style>
    /* ---------- Shared design system (matches Sign tool) ---------- */
    body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      font-family: Arial, system-ui, -apple-system, "Segoe UI", Roboto;
      background: #1789e0;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap, .section, section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      box-sizing: border-box;
    }

    h1 { margin: 0 0 8px 0; font-size: 1.25rem; color: #fff; }
    h2 { margin: 16px 0 8px 0; font-size: 1.05rem; color: #fff; }
    p { margin: 0 0 10px 0; line-height: 1.45; }

    label { display: block; margin-top: 12px; font-weight: 600; color: #f7fbff; }

    input[type="text"], input[type="file"], select, textarea, .input-area {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      box-sizing: border-box;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.08);
      background: #ffffff;
      color: #111;
    }
    textarea, .input-area { min-height: 120px; font-family: inherit; white-space: pre-wrap; }

    button, .button {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.12);
      background: #f3f6fb;
      color: #111;
      text-decoration: none;
      text-align: center;
    }
    button:hover, .button:hover { background: #e7ecf5; }
    button:disabled, button[disabled], .button[disabled] { opacity: 0.6; cursor: not-allowed; }

    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
    .row > label { flex: 1 1 240px; margin-top: 0; }

    .small, .hint, .footer-note { font-size: 0.9rem; color: #eaf6ff; margin-top: 8px; line-height: 1.45; }
    .warn { color: #ffd2d2; }
    a { color: #eaf6ff; }

    #status, .status { margin-top: 10px; font-size: 0.9rem; color: #eaf6ff; white-space: pre-wrap; line-height: 1.45; }
    .success { color: #eaf6ff; }
    .error { color: #ffd2d2; }

    table { width: 100%; border-collapse: collapse; margin-top: 12px; background: #fff; color: #111; border-radius: 6px; overflow: hidden; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: middle; }
    th { background: #1789e0; color: #fff; font-weight: 600; }
    tr:nth-child(even) td { background: #fafafa; }
    .duplicate-highlight td { background: #fff3cd !important; }

    @media (max-width: 560px) {
      .row { flex-direction: column; align-items: stretch; }
      .row > label { flex: 1 1 auto; }
    }

    /* Top banner navigation */
    .top-banner {
      position: sticky;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 9999;
      background: var(--card-bg, #ffffff);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 8px 0;
    }
    .top-nav {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 18px;
      padding: 6px 16px;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .top-nav .nav-link {
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      color: var(--text-color, #111);
      opacity: 0.9;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .top-nav .nav-link.active {
      background: var(--accent, #0b72ff);
      color: #fff;
      box-shadow: 0 4px 14px rgba(11,114,255,0.18);
      transform: translateY(-1px);
    }
    .top-nav .nav-link:hover { opacity: 1; transform: translateY(-1px); }

    @media (max-width:900px) {
      .top-nav { flex-wrap: wrap; gap: 10px; padding: 8px; }
      .top-nav .nav-link { padding: 8px 12px; }
    }
    @media (max-width:700px) {
      .top-nav { flex-wrap: wrap; justify-content: center; }
    }
  </style>

  <script>
    // Mark the active nav link based on the current filename (index counts as home)
    (function () {
      try {
        const links = document.querySelectorAll('.top-banner .nav-link');
        const path = location.pathname.split('/').pop() || 'index.html';
        links.forEach(function (a) {
          if (a.getAttribute('href') === path) {
            a.classList.add('active');
            a.setAttribute('aria-current', 'page');
          }
        });
      } catch (e) { console.warn(e); }
    })();
  </script>

  function base64ToArrayBuffer(b64) {
    const bin = atob(b64);
    const len = bin.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
    return bytes.buffer;
  }

  function updateButton(){
    // Keep the action button always clickable; validation happens on run.
    runBtn.disabled = false;
  }
  xlsxEl.addEventListener('change', updateButton);
  xlsxEl.addEventListener('input', updateButton);
  pdfEl.addEventListener('change', updateButton);
  pdfEl.addEventListener('input', updateButton);
  updateButton();

  function normalizeHeader(s){
    if (s == null) return '';
    return String(s).replace(/\u00A0/g, ' ').trim().replace(/\s+/g, ' ');
  }
  function normForCompare(s){
    return String(s || '').toLowerCase().replace(/[^a-z0-9#]/g, '');
  }
  function findColIndex(headerRow, name){
    if (!headerRow) return -1;
    const targetNorm = normForCompare(name);
    for (let i = 0; i < headerRow.length; i++) {
      if (normalizeHeader(headerRow[i]) === normalizeHeader(name)) return i;
    }
    for (let i = 0; i < headerRow.length; i++) {
      if (String(headerRow[i] || '').toLowerCase() === String(name).toLowerCase()) return i;
    }
    for (let i = 0; i < headerRow.length; i++) {
      const h = normForCompare(headerRow[i]);
      if (!h) continue;
      if (h === targetNorm || h.includes(targetNorm) || targetNorm.includes(h)) return i;
    }
    return -1;
  }
  function findAnyHeader(headerRow, cands){
    for (const c of cands) {
      const i = findColIndex(headerRow, c);
      if (i !== -1) return i;
    }
    return -1;
  }
  function parseNumeric(v){
    if (v == null || v === '') return NaN;
    if (typeof v === 'number') return v;
    let s = String(v).trim();
    let neg = false;
    if (s.startsWith('(') && s.endsWith(')')) { neg = true; s = s.slice(1, -1); }
    s = s.replace(/[^0-9.\-]/g, '');
    if (s === '' || s === '.' || s === '-') return NaN;
    const n = parseFloat(s);
    return isNaN(n) ? NaN : (neg ? -n : n);
  }
  function fmtNumber(v){
    const n = Number(String(v).replace(/[^0-9.\-]/g, ''));
    if (isNaN(n)) return '0.00';
    return n.toFixed(2);
  }
  function safeName(v){
    return String(v || '').trim().replace(/[^\w\-]/g, '_') || 'UNKNOWN';
  }
  function extractCore(fn){
    const base = String(fn || '').replace(/^.*[\/]/, '').replace(/\.[^.]+$/, '');
    const m = base.match(/^(?:Invoice|RGNBillingRpt)_([^_\.]+)(?:_.*)?$/i);
    if (m && m[1]) return m[1];
    const parts = base.split('_').filter(Boolean);
    if (parts.length >= 2) return parts[1];
    return base || null;
  }
  function sortRole(a, b){
    const aFilled = /filled_invoices/i.test(a.zipName) || /^invoice_/i.test(a.filename);
    const bFilled = /filled_invoices/i.test(b.zipName) || /^invoice_/i.test(b.filename);
    if (aFilled !== bFilled) return aFilled ? -1 : 1;
    return a.filename.localeCompare(b.filename);
  }
  function groupList(list){
    const out = {};
    for (const e of list){
      const core = extractCore(e.filename);
      const key = (core || String(e.filename || '')).replace(/[^A-Za-z0-9_]/g, '');
      if (!out[key]) out[key] = [];
      out[key].push(e);
    }
    for (const k of Object.keys(out)) out[k].sort(sortRole);
    return out;
  }
  function findPdfField(fields, name){
    if (!name) return null;
    for (const f of fields){
      try { if (f.getName && f.getName() === name) return f; } catch(e){}
    }
    const low = name.toLowerCase();
    for (const f of fields){
      try {
        const n = String(f.getName && f.getName() || '');
        if (n.toLowerCase() === low) return f;
      } catch(e){}
    }
    for (const f of fields){
      try {
        const n = String(f.getName && f.getName() || '');
        if (n.toLowerCase().includes(low) || low.includes(n.toLowerCase())) return f;
      } catch(e){}
    }
    return null;
  }
  function setFieldText(field, value){
    if (!field) return false;
    try {
      if (typeof field.setText === 'function'){ field.setText(String(value)); return true; }
      if (typeof field.setValue === 'function'){ field.setValue(String(value)); return true; }
    } catch(e){}
    return false;
  }

  function buildSummaryAndWorkbook(workbook){
    const ws = workbook.Sheets[workbook.SheetNames[0]];
    if (!ws) throw new Error('Source worksheet not found.');
    const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
    if (!aoa || aoa.length < 1) throw new Error('Source sheet empty.');

    const rawHeader = aoa[0].map(h => h == null ? '' : String(h));
    const masterInvCandidates = ['MASTER INV NBR','MASTER INV','MASTER INVOICE NBR','MASTER INVOICE','MASTER INVOICE #','MASTER INVOICE NBR.','MASTER INV'];
    const costCenterCandidates = ['COST CENTER','COST_CENTER','COSTCENTER','COST CENTRE'];
    const catalogCandidates = ['CATALOG #','CATALOG','CATALOGNO','CATALOG#','CATALOG #'];
    const unitCandidates = ['UNIT','UNIT OF MEASURE','UOM','QTY'];
    const extCandidates = ['EXT $','EXT','EXTENDED','LINE TOTAL','UNIT $','UNIT$'];
    const taxCandidates = ['TAX','TAX $','TAX$','TAX TOTAL','TAX TOTAL $'];
    const totalCandidates = ['TOTAL','GRAND TOTAL','GRANDTOTAL','AMOUNT TOTAL'];
    const poCandidates = ['PO NBR','PO NBR.','PO NBR#','PO','PO#','PO NUMBER','PO NBR '];
    const orderDateCandidates = ['ORDER DATE','ORDERDATE','DATE'];
    const fsCandidates = ['FS #','FS#','FS NUMBER','FS NO'];

    const masterInvIdx = findAnyHeader(rawHeader, masterInvCandidates);
    const costCenterIdx = findAnyHeader(rawHeader, costCenterCandidates);
    const groupByMaster = (masterInvIdx !== -1);
    const groupingIdx = groupByMaster ? masterInvIdx : costCenterIdx;

    const catalogIdx = findAnyHeader(rawHeader, catalogCandidates);
    const unitIdx = findAnyHeader(rawHeader, unitCandidates);
    const extIdx = findAnyHeader(rawHeader, extCandidates);
    const taxIdx = findAnyHeader(rawHeader, taxCandidates);
    const totalIdx = findAnyHeader(rawHeader, totalCandidates);
    const poIdx = findAnyHeader(rawHeader, poCandidates);
    const orderDateIdx = findAnyHeader(rawHeader, orderDateCandidates);
    const fsIdx = findAnyHeader(rawHeader, fsCandidates);

    const missing = [];
    if (catalogIdx === -1) missing.push('CATALOG #');
    if (unitIdx === -1) missing.push('UNIT / QTY');
    if (extIdx === -1) missing.push('EXT $');
    if (taxIdx === -1) missing.push('TAX');
    if (totalIdx === -1) missing.push('TOTAL');
    if (poIdx === -1) missing.push('PO / PO NBR');
    if (orderDateIdx === -1) missing.push('ORDER DATE');
    if (fsIdx === -1) missing.push('FS #');
    if (groupingIdx === -1) missing.push('MASTER INV NBR or COST CENTER');
    if (missing.length) throw new Error('Missing required column(s): ' + missing.join(', '));

    const transportTotals = new Map();
    const merchTotals = new Map();
    const taxTotals = new Map();
    const grandTotals = new Map();
    const masterValByGroup = new Map();
    const poByGroup = new Map();
    const groupOrder = [];
    const seen = new Set();
    let skipped = 0;

    for (let r = 1; r < aoa.length; r++) {
      const row = aoa[r].slice();
      while (row.length < rawHeader.length) row.push(null);
      const poVal = row[poIdx], orderDateVal = row[orderDateIdx], fsVal = row[fsIdx];
      if (poVal == null || String(poVal).trim() === '' || orderDateVal == null || String(orderDateVal).trim() === '' || fsVal == null || String(fsVal).trim() === '') {
        skipped++;
        continue;
      }

      let grp = row[groupingIdx];
      grp = (grp == null || String(grp).trim() === '') ? 'UNSPECIFIED' : String(grp).trim();

      if (!seen.has(grp)) {
        seen.add(grp);
        groupOrder.push(grp);
        const colA = row[0];
        masterValByGroup.set(grp, (colA != null && String(colA).trim() !== '') ? String(colA).trim() : '');
        const poCell = row[poIdx];
        poByGroup.set(grp, (poCell != null && String(poCell).trim() !== '') ? String(poCell).trim() : '');
      }

      const extVal = parseNumeric(row[extIdx]);
      const taxVal = parseNumeric(row[taxIdx]);
      const totalVal = parseNumeric(row[totalIdx]);

      if (!isNaN(extVal)) merchTotals.set(grp, (merchTotals.get(grp) || 0) + extVal);
      if (!isNaN(taxVal)) taxTotals.set(grp, (taxTotals.get(grp) || 0) + taxVal);
      if (!isNaN(totalVal)) grandTotals.set(grp, (grandTotals.get(grp) || 0) + totalVal);

      const catalogBlank = (row[catalogIdx] == null || String(row[catalogIdx]).trim() === '');
      const unitVal = row[unitIdx];
      const unitEA = (unitVal != null && String(unitVal).trim().toUpperCase() === 'EA');
      if (catalogBlank && unitEA && !isNaN(totalVal)) {
        transportTotals.set(grp, (transportTotals.get(grp) || 0) + totalVal);
      }
    }

    let summary;
    if (groupByMaster) {
      summary = [['MASTER INV NBR','PO NBR','TRANSPORTATION_SUBTOTAL','MERCHANDISE_SUBTOTAL','TAX_SUBTOTAL','GRAND_TOTAL']];
      for (const grp of groupOrder) {
        const transport = +(transportTotals.get(grp) || 0).toFixed(2);
        const merch = +(merchTotals.get(grp) || 0).toFixed(2);
        const tax = +(taxTotals.get(grp) || 0).toFixed(2);
        const grand = +(grandTotals.get(grp) || 0).toFixed(2);
        summary.push([grp, poByGroup.get(grp) || '', transport, merch, tax, grand]);
      }
    } else {
      summary = [['COST CENTER','MASTER INV NBR','PO NBR','TRANSPORTATION_SUBTOTAL','MERCHANDISE_SUBTOTAL','TAX_SUBTOTAL','GRAND_TOTAL']];
      for (const grp of groupOrder) {
        const transport = +(transportTotals.get(grp) || 0).toFixed(2);
        const merch = +(merchTotals.get(grp) || 0).toFixed(2);
        const tax = +(taxTotals.get(grp) || 0).toFixed(2);
        const grand = +(grandTotals.get(grp) || 0).toFixed(2);
        summary.push([grp, masterValByGroup.get(grp) || '', poByGroup.get(grp) || '', transport, merch, tax, grand]);
      }
    }

    const summaryName = 'Transportation Summary';
    const exIdx = workbook.SheetNames.indexOf(summaryName);
    if (exIdx !== -1) {
      delete workbook.Sheets[summaryName];
      workbook.SheetNames.splice(exIdx, 1);
    }
    const wsSummary = XLSX.utils.aoa_to_sheet(summary);
    XLSX.utils.book_append_sheet(workbook, wsSummary, summaryName);

    return { workbook, summary, summaryName, skipped };
  }

  async function createFilledCoverpageEntries(summaryRows, pdfBytes, startValue, invoiceValue){
    const entries = [];
    if (!summaryRows || summaryRows.length < 2) throw new Error('Transportation Summary sheet must have a header row and at least one data row.');

    const header = summaryRows[0].map(h => (h == null || h === undefined) ? '' : String(h));
    const rows = summaryRows.slice(1).map(r => r.map(c => (c == null || c === undefined) ? '' : c));

    function findHeaderIndex(headerRow, candidates){
      for (const c of candidates) {
        const target = String(c).trim().toUpperCase();
        for (let i = 0; i < headerRow.length; i++) {
          if (String(headerRow[i] || '').trim().toUpperCase() === target) return i;
        }
      }
      return -1;
    }

    const mapping = [
      { headerCandidates: ['MASTER INV NBR','MASTER INV','MASTER INVOICE','MASTER INVOICE NBR'], pdfNames: ['Invoice#','INVOICE#','INVOICE_NUMBER'] },
      { headerCandidates: ['PO NBR','PO','PO#','PO NBR.','PO NUMBER','PURCHASE ORDER','PURCHASEORDER','PO NBR '], pdfNames: ['PURCHASEORDER#','PURCHASE ORDER #','PurchaseOrder#','PURCHASE_ORDER','#PO'] },
      { headerCandidates: ['TRANSPORTATION_SUBTOTAL','TRANSPORTATION SUBTOTAL','TRANS TOTAL','TRANSTOTAL','TRANSTOTAL$','TRANS TOTAL $'], pdfNames: ['TRANSTOTAL$','TransTotal$','TRANS_TOTAL','TRANSTOTAL'] },
      { headerCandidates: ['MERCHANDISE_SUBTOTAL','MERCHANDISE SUBTOTAL','MERCH TOTAL','MERCHTOTAL','MERCH TOTAL $'], pdfNames: ['MERCHTOTAL$','MerchTotal$','MERCH_TOTAL','MERCHTOTAL'] },
      { headerCandidates: ['TAX_SUBTOTAL','TAX SUBTOTAL','TAX TOTAL','TAXTOTAL','TAX TOTAL $'], pdfNames: ['TAXTOTAL$','TaxTotal$','TAX_TOTAL','TAXTOTAL'] },
      { headerCandidates: ['GRAND_TOTAL','GRAND TOTAL','GRANDTOTAL','GRAND TOTAL $'], pdfNames: ['GRANDTOTAL$','GrandTotal$','GRANDTOTAL','GRAND TOTAL'] }
    ];

    const indices = {};
    const missingHeaders = [];
    for (const m of mapping) {
      const idx = findHeaderIndex(header, m.headerCandidates);
      if (idx === -1) missingHeaders.push(m.headerCandidates[0]);
      else indices[m.headerCandidates[0]] = idx;
    }
    if (missingHeaders.length) throw new Error('Missing Transportation Summary column(s): ' + missingHeaders.join(', '));

    for (let r = 0; r < rows.length; r++) {
      const row = rows[r];
      const masterVal = row[indices[mapping[0].headerCandidates[0]]] || '';
      const poVal = row[indices[mapping[1].headerCandidates[0]]] || '';
      const transVal = row[indices[mapping[2].headerCandidates[0]]] || 0;
      const merchVal = row[indices[mapping[3].headerCandidates[0]]] || 0;
      const taxVal = row[indices[mapping[4].headerCandidates[0]]] || 0;
      const grandVal = row[indices[mapping[5].headerCandidates[0]]] || 0;

      const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
      const form = pdfDoc.getForm();
      const fields = form.getFields();

      const fMaster = mapping[0].pdfNames.map(n => findPdfField(fields, n)).find(Boolean);
      const fPo = mapping[1].pdfNames.map(n => findPdfField(fields, n)).find(Boolean);
      const fTrans = mapping[2].pdfNames.map(n => findPdfField(fields, n)).find(Boolean);
      const fMerch = mapping[3].pdfNames.map(n => findPdfField(fields, n)).find(Boolean);
      const fTax = mapping[4].pdfNames.map(n => findPdfField(fields, n)).find(Boolean);
      const fGrand = mapping[5].pdfNames.map(n => findPdfField(fields, n)).find(Boolean);

      setFieldText(fMaster, masterVal);
      setFieldText(fPo, poVal);
      setFieldText(fTrans, fmtNumber(transVal));
      setFieldText(fMerch, fmtNumber(merchVal));
      setFieldText(fTax, fmtNumber(taxVal));
      setFieldText(fGrand, fmtNumber(grandVal));

      if (startValue) {
        const fStart = findPdfField(fields, 'START DATE') || findPdfField(fields, 'STARTDATE');
        if (fStart) setFieldText(fStart, startValue);
      }
      if (invoiceValue) {
        const fInvDate = findPdfField(fields, 'INVOICE DATE') || findPdfField(fields, 'INVOICEDATE');
        if (fInvDate) setFieldText(fInvDate, invoiceValue);
      }

      const safeMaster = safeName(masterVal);
      const safePo = safeName(poVal);
      const fileName = `Invoice_${safeMaster}_${safePo || 'NOPONBR'}.pdf`;
      const outBytes = await pdfDoc.save();
      entries.push({ filename: fileName, bytes: outBytes });
    }

    return entries;
  }

  async function createGroupPdfEntries(workbook){
    const ws = workbook.Sheets[workbook.SheetNames[0]];
    if (!ws) throw new Error('Sheet missing');

    const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
    if (!aoa || aoa.length === 0) throw new Error('Sheet empty');

    const header = aoa[0].map(c => c == null ? '' : String(c));
    let lastRow = aoa.length;
    if (ws['!ref']) {
      try {
        const rng = XLSX.utils.decode_range(ws['!ref']);
        lastRow = rng.e.r + 1;
      } catch(e) {}
    }

    const headerLower = header.map(h => String(h || '').toLowerCase());
    function findHeaderIndex(headerLowerRow, cands){
      for (const c of cands) {
        const lc = c.toLowerCase();
        const idx = headerLowerRow.findIndex(h => h === lc || (h && h.includes(lc)));
        if (idx !== -1) return idx;
      }
      return -1;
    }

    const masterIdx = findHeaderIndex(headerLower, ['master inv nbr', 'master inv number', 'master inv', 'master_inv_nbr', 'masterinvoice', 'master invoice', 'master']);

    const moneyCols = (() => {
      const lower = header.map(h => String(h || '').toLowerCase());
      const keywords = ['total', 'ext', 'amount', 'unit $', 'unit$', '$', 'tax', 'line total'];
      const money = new Set();
      for (let i = 0; i < header.length; i++) {
        const h = lower[i] || '';
        for (const kw of keywords) {
          if (h.includes(kw)) { money.add(i); break; }
        }
      }
      if (money.size === 0) {
        const sample = Math.min(30, Math.max(0, aoa.length - 1));
        for (let c = 0; c < header.length; c++) {
          let num = 0, tot = 0;
          for (let r = 1; r <= sample; r++) {
            const v = (aoa[r] && aoa[r][c] !== undefined) ? aoa[r][c] : '';
            if (v === '' || v == null) continue;
            tot++;
            if (!isNaN(parseNumeric(v))) num++;
          }
          if (tot > 0 && (num / tot) >= 0.6) money.add(c);
        }
      }
      return money;
    })();

    const groups = [];
    const groupMap = new Map();
    let currentMaster = '';

    for (let r = 2; r <= lastRow; r++) {
      const row = aoa[r - 1] || [];
      const rowHasData = row.some(v => String(v ?? '').trim() !== '');
      if (!rowHasData) continue;

      const rawMaster = masterIdx >= 0 ? String(row[masterIdx] ?? '').trim() : '';
      if (rawMaster) currentMaster = rawMaster;
      if (!currentMaster) currentMaster = 'UNSPECIFIED';

      if (!groupMap.has(currentMaster)) {
        const g = { master: currentMaster, rows: [] };
        groupMap.set(currentMaster, g);
        groups.push(g);
      }
      groupMap.get(currentMaster).rows.push(row);
    }

    if (groups.length === 0) throw new Error('No groups found');

    function sanitize(s){
      if (s == null) return '';
      let t = String(s);
      t = t.normalize('NFKD').replace(/[\u0300-\u036f]/g, '');
      t = t.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_\-\.]/g, '_').replace(/_+/g, '_');
      return t.slice(0, 80) || '';
    }

    async function createStyledPdf(headerRow, rows, opts = {}) {
      const { orientation = 'landscape', paper = 'letter', marginPt = 18, baseFontSize = 10, minFontSize = 6 } = opts;
      const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) ? window.jspdf.jsPDF : window.jsPDF;
      if (!jsPDFCtor) throw new Error('jsPDF library failed to load.');
      const doc = new jsPDFCtor({ orientation, unit: 'pt', format: paper });
      if (typeof doc.autoTable !== 'function' && typeof window.autoTable === 'function') {
        doc.autoTable = window.autoTable;
      }
      doc.setFont('helvetica');

      const pw = doc.internal.pageSize.getWidth();
      const left = marginPt;
      const right = pw - marginPt;
      const usableW = right - left;
      const numCols = headerRow.length;

      const numericCol = new Array(numCols).fill(false);
      for (let c = 0; c < numCols; c++) {
        let numericCount = 0, totalCount = 0;
        for (let r = 0; r < Math.min(rows.length, 80); r++) {
          const v = rows[r][c];
          if (v === undefined || v === null || String(v).trim() === '') continue;
          totalCount++;
          if (!isNaN(parseNumeric(v))) numericCount++;
        }
        if (totalCount > 0 && (numericCount / totalCount) >= 0.6) numericCol[c] = true;
        const h = String(headerRow[c] || '').toLowerCase();
        if (h.includes('total') || h.includes('ext') || h.includes('amount') || h.includes('$') || h.includes('grand')) numericCol[c] = true;
      }

      const totalColIndex = headerRow.findIndex(h => String(h || '').trim().toUpperCase() === 'TOTAL');
      const grandTotal = totalColIndex === -1 ? null : rows.reduce((sum, row) => {
        const n = parseNumeric(row[totalColIndex]);
        return sum + (isNaN(n) ? 0 : n);
      }, 0);

      doc.setFontSize(baseFontSize);
      function measure(txt){
        try { return doc.getTextWidth(String(txt)); }
        catch(e){ return String(txt).length * (baseFontSize * 0.5); }
      }

      const maxWidths = new Array(numCols).fill(0);
      for (let c = 0; c < numCols; c++) maxWidths[c] = Math.max(maxWidths[c], measure(headerRow[c] || ''));
      for (let r = 0; r < Math.min(rows.length, 400); r++) {
        for (let c = 0; c < numCols; c++) {
          const cell = rows[r][c] !== undefined && rows[r][c] !== null ? String(rows[r][c]) : '';
          maxWidths[c] = Math.max(maxWidths[c], measure(cell));
        }
      }

      const colPadding = 12;
      const paddedWidths = maxWidths.map(w => Math.max(30, w + colPadding));
      const totalNatural = paddedWidths.reduce((a, b) => a + b, 0) || 1;
      const hScale = Math.min(1, usableW / totalNatural);
      const fontSize = Math.max(minFontSize, Math.floor(baseFontSize * hScale));

      let colWidths = paddedWidths.map(w => Math.floor(w * hScale));
      let assigned = colWidths.reduce((a, b) => a + b, 0);
      let leftover = Math.round(usableW - assigned);
      let ci = 0;
      while (leftover > 0) {
        colWidths[ci % numCols] += 1;
        leftover--;
        ci++;
      }

      const head = [headerRow.map(h => String(h || ''))];
      const body = rows.map(r => r.map(c => c === undefined || c === null ? '' : String(c)));
      const columnStyles = {};
      for (let i = 0; i < numCols; i++) {
        columnStyles[i] = { cellWidth: colWidths[i], halign: numericCol[i] ? 'right' : 'left', valign: 'middle' };
      }

      doc.autoTable({
        head,
        body,
        startY: marginPt,
        margin: { left: left, right: marginPt },
        styles: { font: 'helvetica', fontSize: fontSize, cellPadding: 4, overflow: 'linebreak', valign: 'middle' },
        headStyles: { fillColor: [245, 245, 245], textColor: 20, fontStyle: 'bold', halign: 'left' },
        alternateRowStyles: { fillColor: [250, 250, 250] },
        theme: 'grid',
        columnStyles,
        tableWidth: 'auto',
        showHead: 'everyPage'
      });

      if (grandTotal !== null) {
        const lastY = doc.lastAutoTable && typeof doc.lastAutoTable.finalY === 'number' ? doc.lastAutoTable.finalY : marginPt;
        const pageHeight = doc.internal.pageSize.getHeight();
        const lineText = `Grand Total: ${grandTotal.toFixed(2)}`;
        const lineY = lastY + 18;
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(11);
        if (lineY > pageHeight - marginPt) {
          doc.addPage();
          doc.text(lineText, left, marginPt + 10);
        } else {
          doc.text(lineText, left, lineY);
        }
      }

      const pdfBytes = doc.output('arraybuffer');
      return new Blob([pdfBytes], { type: 'application/pdf' });
    }

    const pdfEntries = [];
    const manifestLines = [
      'Generated grouped PDFs',
      `Groups detected: ${groups.length}`,
      `Rows processed: ${groups.reduce((sum, g) => sum + g.rows.length, 0)}`
    ];

    for (let i = 0; i < groups.length; i++) {
      const g = groups[i];
      const rowsForPdf = g.rows.map(row => header.map((_, c) => (row[c] === undefined || row[c] === null) ? '' : String(row[c])));
      const safeMaster = sanitize(g.master) || `group_${i + 1}`;
      const pdfBlob = await createStyledPdf(header, rowsForPdf, {
        orientation: 'landscape',
        paper: 'letter',
        marginPt: 18,
        baseFontSize: 10,
        minFontSize: 6
      });
      const bytes = await pdfBlob.arrayBuffer();
      pdfEntries.push({ filename: `RGNBillingRpt_${safeMaster}.pdf`, bytes });
      manifestLines.push(`- ${safeMaster}: ${g.rows.length} rows`);
    }

    return {
      pdfEntries,
      groupsCount: groups.length,
      manifest: manifestLines.join('\n')
    };
  }

  async function mergeGroupedEntries(grouped){
    const merged = [];
    const keys = Object.keys(grouped).sort();
    for (const key of keys) {
      const docs = grouped[key];
      if (!docs.length) continue;
      const out = await PDFLib.PDFDocument.create();
      for (const d of docs) {
        const src = await PDFLib.PDFDocument.load(d.bytes);
        const pages = await out.copyPages(src, src.getPageIndices());
        pages.forEach(p => out.addPage(p));
      }
      merged.push({ filename: `Invoice_${key}.pdf`, bytes: await out.save() });
    }
    return merged;
  }

  function generateManifestPdf(summary, baseName){
    const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) ? window.jspdf.jsPDF : window.jsPDF;
    if (!jsPDFCtor) throw new Error('jsPDF library failed to load.');
    const pdf = new jsPDFCtor({ unit: 'pt', format: 'letter', orientation: 'landscape' });
    if (typeof pdf.autoTable !== 'function' && typeof window.autoTable === 'function') pdf.autoTable = window.autoTable;

    const margin = 36;
    const header = (summary[0] || []).map(h => String(h == null ? '' : h));
    const dataRows = summary.slice(1);
    const isMoney = header.map(h => /subtotal|total/i.test(h));
    const fmt = v => (Number(v) || 0).toLocaleString('en-US', { style: 'currency', currency: 'USD' });

    const body = dataRows.map(row => header.map((h, c) => isMoney[c] ? fmt(row[c]) : String(row[c] == null ? '' : row[c])));
    const totalRow = header.map((h, c) => {
      if (c === 0) return 'TOTAL';
      if (!isMoney[c]) return '';
      return fmt(dataRows.reduce((s, row) => s + (Number(row[c]) || 0), 0));
    });
    body.push(totalRow);

    pdf.setFontSize(18);
    pdf.text('Billing Manifest', margin, 60);
    pdf.setFontSize(10);
    pdf.text(`Source: ${baseName}`, margin, 78);
    pdf.autoTable({
      startY: 100,
      head: [header],
      body,
      styles: { fontSize: 9, cellPadding: 6 },
      headStyles: { fillColor: 220, textColor: 20, fontStyle: 'bold' },
      alternateRowStyles: { fillColor: 245 },
      theme: 'grid'
    });
    return pdf.output('arraybuffer');
  }

  runBtn.addEventListener('click', async () => {
    statusEl.textContent = 'Reading workbook and coverpage...';

    try {
      const xlsxFile = xlsxEl.files[0];
      const pdfFile = pdfEl.files[0];
      if (!xlsxFile) throw new Error('No Excel file selected.');

      const wbData = await xlsxFile.arrayBuffer();
      const workbook = XLSX.read(wbData, { type: 'array', cellDates: false, raw: false });
      const summaryInfo = buildSummaryAndWorkbook(workbook);
      const summarySheet = workbook.Sheets['Transportation Summary'];
      const summaryAoa = XLSX.utils.sheet_to_json(summarySheet, { header: 1, defval: '' });

      statusEl.textContent = 'Creating coverpage PDFs...';
      const pdfBytes = pdfFile ? await pdfFile.arrayBuffer() : base64ToArrayBuffer(EMBEDDED_TEMPLATE_B64);
      const coverEntries = await createFilledCoverpageEntries(summaryAoa, pdfBytes, startEl.value.trim(), invoiceEl.value.trim());

      statusEl.textContent = 'Creating grouped PDFs...';
      const groupInfo = await createGroupPdfEntries(workbook);

      statusEl.textContent = 'Merging PDFs...';
      const mergedEntries = await mergeGroupedEntries(groupList(coverEntries.concat(groupInfo.pdfEntries)));

      statusEl.textContent = 'Packaging final ZIP...';
      const zip = new JSZip();
      const base = (xlsxFile.name || 'workbook').replace(/\.(xlsx|xls)$/i, '');

      const manifestPdfBytes = generateManifestPdf(summaryInfo.summary, base);
      zip.file(`${base}_Manifest.pdf`, manifestPdfBytes);
      const invoicesFolder = zip.folder('Invoices');
      for (const e of mergedEntries) invoicesFolder.file(e.filename, e.bytes);

      const bundle = await zip.generateAsync({ type: 'blob' });
      const outName = `${base}_billing_output.zip`;
      const url = URL.createObjectURL(bundle);
      const a = document.createElement('a');
      a.href = url;
      a.download = outName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      statusEl.textContent = `Done. Downloaded ${outName}.\nContains ${base}_Manifest.pdf plus ${mergedEntries.length} invoice PDFs in the Invoices folder.`;
    } catch (err) {
      console.error(err);
      statusEl.textContent = 'Error: ' + (err && err.message ? err.message : String(err));
    }
  });
})();
</script>
</body>
</html>
