  <style>
    /* ---------- Shared design system (matches Sign tool) ---------- */
    body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      font-family: Arial, system-ui, -apple-system, "Segoe UI", Roboto;
      background: #1789e0;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap, .section, section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      box-sizing: border-box;
    }

    h1 { margin: 0 0 8px 0; font-size: 1.25rem; color: #fff; }
    h2 { margin: 16px 0 8px 0; font-size: 1.05rem; color: #fff; }
    p { margin: 0 0 10px 0; line-height: 1.45; }

    label { display: block; margin-top: 12px; font-weight: 600; color: #f7fbff; }

    input[type="text"], input[type="file"], select, textarea, .input-area {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      box-sizing: border-box;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.08);
      background: #ffffff;
      color: #111;
    }
    textarea, .input-area { min-height: 120px; font-family: inherit; white-space: pre-wrap; }

    button, .button {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.12);
      background: #f3f6fb;
      color: #111;
      text-decoration: none;
      text-align: center;
    }
    button:hover, .button:hover { background: #e7ecf5; }
    button:disabled, button[disabled], .button[disabled] { opacity: 0.6; cursor: not-allowed; }

    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
    .row > label { flex: 1 1 240px; margin-top: 0; }

    .small, .hint, .footer-note { font-size: 0.9rem; color: #eaf6ff; margin-top: 8px; line-height: 1.45; }
    .warn { color: #ffd2d2; }

    #status, .status { margin-top: 10px; font-size: 0.9rem; color: #eaf6ff; white-space: pre-wrap; line-height: 1.45; }
    .success { color: #eaf6ff; }
    .error { color: #ffd2d2; }

    table { width: 100%; border-collapse: collapse; margin-top: 12px; background: #fff; color: #111; border-radius: 6px; overflow: hidden; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: middle; }
    th { background: #1789e0; color: #fff; font-weight: 600; }
    tr:nth-child(even) td { background: #fafafa; }
    .duplicate-highlight td { background: #fff3cd !important; }

    @media (max-width: 560px) {
      .row { flex-direction: column; align-items: stretch; }
      .row > label { flex: 1 1 auto; }
    }

    /* Progress bar */
    .progressWrap { margin-top: 16px; background: rgba(0,0,0,0.08); border-radius: 8px; overflow: hidden; height: 16px; }
    .progressBar { width: 0%; height: 100%; background: linear-gradient(90deg,#00ffb3,#00aaff); transition: width 300ms ease; }

    /* Top banner navigation */
    .top-banner {
      position: sticky;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 9999;
      background: var(--card-bg, #ffffff);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 8px 0;
    }
    .top-nav {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 18px;
      padding: 6px 16px;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .top-nav .nav-link {
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      color: var(--text-color, #111);
      opacity: 0.9;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .top-nav .nav-link.active {
      background: var(--accent, #0b72ff);
      color: #fff;
      box-shadow: 0 4px 14px rgba(11,114,255,0.18);
      transform: translateY(-1px);
    }
    .top-nav .nav-link:hover { opacity: 1; transform: translateY(-1px); }

    @media (max-width:900px) {
      .top-nav { flex-wrap: wrap; gap: 10px; padding: 8px; }
      .top-nav .nav-link { padding: 8px 12px; }
    }
    @media (max-width:700px) {
      .top-nav { flex-wrap: wrap; justify-content: center; }
    }
  </style>

  <script>
    // Mark the active nav link based on the current filename (index counts as home)
    (function () {
      try {
        const links = document.querySelectorAll('.top-banner .nav-link');
        const path = location.pathname.split('/').pop() || 'index.html';
        links.forEach(function (a) {
          if (a.getAttribute('href') === path) {
            a.classList.add('active');
            a.setAttribute('aria-current', 'page');
          }
        });
      } catch (e) { console.warn(e); }
    })();
  </script>

  <div class="section">
    <h1>RGN Billing</h1>
    <p class="small">Upload the consolidated billing report and enter the date range, then click Create Billing Reports.</p>

    <label>
      Consolidated Billing Report (excel)
      <input id="excelFile" type="file" accept=".xlsx,.xls" />
    </label>

    <label>
      Cover Page Template (pdf) 
      <input id="pdfTemplate" type="file" accept=".pdf" />
    </label>

    <div class="row">
      <label>
        Start Date
        <input id="startDate" type="text" placeholder="YYYY-MM-DD or mm/dd/yyyy" />
      </label>
      <label>
        Invoice Date
        <input id="invoiceDate" type="text" placeholder="YYYY-MM-DD or mm/dd/yyyy" />
      </label>
    </div>

    <div class="row">
      <button id="runBtn" disabled>Create Billing Reports</button>
      <button id="clearBtn" type="button">Clear</button>
    </div>

    <div class="progressWrap" aria-label="Progress">
      <div id="progressBar" class="progressBar"></div>
    </div>

    <div id="status">Waiting for files.</div>
  </div>

      function base64ToArrayBuffer(b64) {
        const bin = atob(b64);
        const len = bin.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
        return bytes.buffer;
      }

      function setStatus(msg, kind) {
        statusEl.className = kind === 'error' ? 'error' : kind === 'success' ? 'success' : '';
        statusEl.textContent = msg;
      }

      function setProgress(p) {
        progressBar.style.width = Math.max(0, Math.min(100, p)) + '%';
      }

      function enableRun() {
        runBtn.disabled = !excelEl.files.length;
      }

      function clearAll() {
        excelEl.value = '';
        pdfEl.value = '';
        startEl.value = '';
        invoiceEl.value = '';
        setStatus('Waiting for files.');
        setProgress(0);
        enableRun();
      }

      function normalizeHeader(s) {
        if (s == null) return '';
        let t = String(s).replace(/\u00A0/g, ' ').trim();
        return t.replace(/\s+/g, ' ');
      }

      function normForCompare(s) {
        return String(s || '').toLowerCase().replace(/[^a-z0-9#]/g, '');
      }

      function findColIndex(headerRow, name) {
        if (!headerRow) return -1;
        for (let i = 0; i < headerRow.length; i++) {
          if (normalizeHeader(headerRow[i]) === normalizeHeader(name)) return i;
        }
        for (let i = 0; i < headerRow.length; i++) {
          if (String(headerRow[i]).toLowerCase() === String(name).toLowerCase()) return i;
        }
        const target = normForCompare(name);
        for (let i = 0; i < headerRow.length; i++) {
          const h = normForCompare(headerRow[i]);
          if (!h) continue;
          if (h === target || h.includes(target) || target.includes(h)) return i;
        }
        return -1;
      }

      function findAnyHeader(headerRow, cands) {
        for (const c of cands) {
          const i = findColIndex(headerRow, c);
          if (i !== -1) return i;
        }
        return -1;
      }

      function parseNumeric(v) {
        if (v == null || v === '') return NaN;
        if (typeof v === 'number') return v;
        let s = String(v).trim();
        let neg = false;
        if (s.startsWith('(') && s.endsWith(')')) {
          neg = true;
          s = s.slice(1, -1);
        }
        s = s.replace(/[^0-9.\-]/g, '');
        if (s === '' || s === '.' || s === '-') return NaN;
        const n = parseFloat(s);
        return isNaN(n) ? NaN : (neg ? -n : n);
      }

      function toCents(v) {
        const n = parseNumeric(v);
        if (!isFinite(n) || isNaN(n)) return null;
        return Math.round(n * 100);
      }

      function centsToStr(c) {
        return (c / 100).toFixed(2);
      }

      function sanitize(s) {
        if (s == null) return '';
        let t = String(s);
        t = t.normalize('NFKD').replace(/[\u0300-\u036f]/g, '');
        t = t.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_\-.]/g, '_').replace(/_+/g, '_');
        return t.slice(0, 80) || '';
      }

      function fileBaseName(name) {
        return String(name || 'workbook').replace(/\.(xlsx|xls)$/i, '');
      }

      function makeDownload(blob, name) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      async function readWorkbook(file) {
        const data = await file.arrayBuffer();
        return XLSX.read(data, { type: 'array', cellDates: false, raw: false });
      }

      function buildTransportationSummary(workbook) {
        const ws = workbook.Sheets[workbook.SheetNames[0]];
        if (!ws) throw new Error('Source worksheet not found.');

        const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
        if (!aoa || aoa.length < 1) throw new Error('Source sheet is empty.');

        const rawHeader = aoa[0].map(h => (h == null ? '' : String(h)));
        const catalogCandidates = ['CATALOG #', 'CATALOG', 'CATALOGNO', 'CATALOG#'];
        const unitCandidates = ['UNIT', 'UNIT OF MEASURE', 'UOM', 'QTY'];
        const costCenterCandidates = ['COST CENTER', 'COST_CENTER', 'COSTCENTER', 'COST CENTRE'];
        const masterCandidates = ['MASTER INV NBR', 'MASTER INV NUMBER', 'MASTER INV', 'MASTER INVOICE NBR', 'MASTER INVOICE NUMBER', 'MASTER INVOICE', 'MASTERINVNBR', 'MASTERINVOICE'];
        const totalCandidates = ['TOTAL', 'EXT $', 'EXT', 'EXTENDED', 'LINE TOTAL', 'UNIT $', 'UNIT$'];
        const poCandidates = ['PO NBR', 'PO NBR.', 'PO NBR#', 'PO', 'PO#', 'PO NUMBER', 'PO NBR '];
        const orderDateCandidates = ['ORDER DATE', 'ORDERDATE', 'DATE'];
        const fsCandidates = ['FS #', 'FS#', 'FS NUMBER', 'FS NO'];

        const catalogIdx = findAnyHeader(rawHeader, catalogCandidates);
        const unitIdx = findAnyHeader(rawHeader, unitCandidates);
        const costCenterIdx = findAnyHeader(rawHeader, costCenterCandidates);
        let masterIdx = findAnyHeader(rawHeader, masterCandidates);
        const totalIdx = findAnyHeader(rawHeader, totalCandidates);
        let poIdx = findAnyHeader(rawHeader, poCandidates);
        const orderDateIdx = findAnyHeader(rawHeader, orderDateCandidates);
        const fsIdx = findAnyHeader(rawHeader, fsCandidates);

        let usedMasterFallback = false;
        if (masterIdx === -1 && rawHeader.length >= 1) {
          masterIdx = 0;
          usedMasterFallback = true;
        }

        let usedPoFallback = false;
        if (poIdx === -1 && rawHeader.length >= 3) {
          poIdx = 2;
          usedPoFallback = true;
        }

        const missing = [];
        if (catalogIdx === -1) missing.push('CATALOG #');
        if (unitIdx === -1) missing.push('UNIT / QTY');
        if (masterIdx === -1 && !usedMasterFallback) missing.push('MASTER INV NBR');
        if (totalIdx === -1) missing.push('TOTAL');
        if (!usedPoFallback && poIdx === -1) missing.push('PO / PO NBR');
        if (orderDateIdx === -1) missing.push('ORDER DATE');
        if (fsIdx === -1) missing.push('FS #');
        if (missing.length) {
          throw new Error('Missing required column(s): ' + missing.join(', '));
        }

        const transportTotals = new Map();
        const allTotals = new Map();
        const costCenterByMaster = new Map();
        const poByMaster = new Map();
        const masterOrder = [];
        const seen = new Set();
        let skipped = 0;

        for (let r = 1; r < aoa.length; r++) {
          const row = aoa[r].slice();
          while (row.length < rawHeader.length) row.push(null);

          const poVal = row[poIdx];
          const orderDateVal = row[orderDateIdx];
          const fsVal = row[fsIdx];
          if (poVal == null || String(poVal).trim() === '' || orderDateVal == null || String(orderDateVal).trim() === '' || fsVal == null || String(fsVal).trim() === '') {
            skipped++;
            continue;
          }

          let master = row[masterIdx];
          master = (master == null || String(master).trim() === '') ? 'UNSPECIFIED' : String(master).trim();

          if (!seen.has(master)) {
            seen.add(master);
            masterOrder.push(master);
            const ccVal = row[costCenterIdx];
            costCenterByMaster.set(master, (ccVal != null && String(ccVal).trim() !== '') ? String(ccVal).trim() : '');
            const colC = row[2];
            poByMaster.set(master, (colC != null && String(colC).trim() !== '') ? String(colC).trim() : '');
          }

          const totalVal = parseNumeric(row[totalIdx]);
          if (!isNaN(totalVal)) allTotals.set(master, (allTotals.get(master) || 0) + totalVal);

          const catalogBlank = (row[catalogIdx] == null || String(row[catalogIdx]).trim() === '');
          const unitVal = row[unitIdx];
          const unitEA = (unitVal != null && String(unitVal).trim().toUpperCase() === 'EA');
          if (catalogBlank && unitEA && !isNaN(totalVal)) {
            transportTotals.set(master, (transportTotals.get(master) || 0) + totalVal);
          }
        }

        const summary = [['COST CENTER', 'MASTER INV NBR', 'PO NBR', 'TRANSPORTATION_SUBTOTAL', 'MERCHANDISE_SUBTOTAL', 'GRAND_TOTAL']];
        for (const master of masterOrder) {
          const transport = +(transportTotals.get(master) || 0).toFixed(2);
          const all = +(allTotals.get(master) || 0).toFixed(2);
          const merch = +(all - transport).toFixed(2);
          summary.push([costCenterByMaster.get(master) || '', master, poByMaster.get(master) || '', transport, merch, +(transport + merch).toFixed(2)]);
        }

        return { summary, skipped };
      }

      function findField(fields, name) {
        if (!name) return null;
        const exact = fields.find(f => f.getName() === name);
        if (exact) return exact;
        const lower = name.toLowerCase();
        return fields.find(f => String(f.getName()).toLowerCase() === lower || String(f.getName()).toLowerCase().includes(lower));
      }

      function setField(f, v) {
        if (!f) return false;
        try {
          if (typeof f.setText === 'function') {
            f.setText(String(v));
            return true;
          }
          if (typeof f.setValue === 'function') {
            f.setValue(String(v));
            return true;
          }
        } catch (e) {}
        return false;
      }

      function fmtNumber(v) {
        const n = Number(String(v).replace(/[^0-9.\-]/g, '')) || 0;
        return n.toFixed(2);
      }

      function generateManifestPdf(summary, baseName) {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ unit: 'pt', format: 'letter', orientation: 'landscape' });
        const margin = 36;
        const headerRow = ['COST CENTER', 'MASTER INV NBR', 'PO NBR', 'TRANSPORTATION_SUBTOTAL', 'MERCHANDISE_SUBTOTAL', 'GRAND_TOTAL'];

        const bodyArrays = summary.slice(1).map(row => {
          const t = Number(row[3] || 0);
          const m = Number(row[4] || 0);
          const g = Number(row[5] || (t + m));
          const fmt = v => v.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
          return [String(row[0] || ''), String(row[1] || ''), String(row[2] || ''), fmt(t), fmt(m), fmt(g)];
        });

        const totals = bodyArrays.reduce((acc, arr) => {
          const parse = s => Number(String(s).replace(/[^0-9.\-]/g, '')) || 0;
          acc.t += parse(arr[3]);
          acc.m += parse(arr[4]);
          acc.g += parse(arr[5]);
          return acc;
        }, { t: 0, m: 0, g: 0 });

        const fmt = v => v.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
        bodyArrays.push(['TOTAL', '', '', fmt(totals.t), fmt(totals.m), fmt(totals.g)]);

        pdf.setFontSize(18);
        pdf.text('Billing Manifest', margin, 60);
        pdf.setFontSize(10);
        pdf.text(`Source: ${baseName}`, margin, 78);
        pdf.autoTable({
          startY: 100,
          head: [headerRow],
          body: bodyArrays,
          styles: { fontSize: 9, cellPadding: 6 },
          headStyles: { fillColor: 220, textColor: 20, fontStyle: 'bold' },
          alternateRowStyles: { fillColor: 245 },
          theme: 'grid'
        });
        return pdf.output('blob');
      }

      async function buildCoverPages(summaryRows, pdfBuffer, startDate, invoiceDate) {
        const entries = [];
        for (let i = 1; i < summaryRows.length; i++) {
          const row = summaryRows[i];
          const costCenter = row[0] || '';
          const master = row[1] || '';
          const po = row[2] || '';
          const trans = row[3] || '';
          const merch = row[4] || '';
          const grand = row[5] || '';

          const pdfDoc = await PDFLib.PDFDocument.load(pdfBuffer);
          const form = pdfDoc.getForm();
          const fields = form.getFields();

          setField(findField(fields, PDF_TARGETS.invoiceField), master);
          setField(findField(fields, PDF_TARGETS.poField), po);
          setField(findField(fields, PDF_TARGETS.transField), fmtNumber(trans));
          setField(findField(fields, PDF_TARGETS.merchField), fmtNumber(merch));
          setField(findField(fields, PDF_TARGETS.grandField), fmtNumber(grand));
          if (startDate) setField(findField(fields, PDF_TARGETS.startField), startDate);
          if (invoiceDate) setField(findField(fields, PDF_TARGETS.invoiceDateField), invoiceDate);

          const bytes = await pdfDoc.save();
          const filename = `Invoice_${sanitize(master)}_${sanitize(costCenter)}.pdf`;
          entries.push({ filename, blob: new Blob([bytes], { type: 'application/pdf' }) });
        }
        return entries;
      }

      function isBlank(cell) {
        if (!cell) return true;
        const v = (cell.v === undefined || cell.v === null) ? '' : String(cell.v).trim();
        return v === '';
      }

      function cellBold(cell) {
        if (!cell || !cell.s) return false;
        try {
          const f = cell.s.font || {};
          if (f.bold === true) return true;
          if (f.fontWeight && (String(f.fontWeight).toLowerCase() === 'bold' || parseInt(f.fontWeight, 10) >= 700)) return true;
        } catch (e) {}
        return false;
      }

      function detectMoneyCols(header, aoa, sample = 30) {
        const lower = header.map(h => String(h || '').toLowerCase());
        const keywords = ['total', 'ext', 'amount', 'unit $', 'unit$', '$', 'tax', 'line total'];
        const money = new Set();
        for (let i = 0; i < header.length; i++) {
          const h = lower[i] || '';
          for (const kw of keywords) {
            if (h.includes(kw)) {
              money.add(i);
              break;
            }
          }
        }
        if (money.size === 0) {
          const rows = Math.min(sample, Math.max(0, aoa.length - 1));
          for (let c = 0; c < header.length; c++) {
            let num = 0, tot = 0;
            for (let r = 1; r <= rows; r++) {
              const v = (aoa[r] && aoa[r][c] !== undefined) ? aoa[r][c] : '';
              if (v === '' || v == null) continue;
              tot++;
              const n = parseNumeric(v);
              if (!isNaN(n)) num++;
            }
            if (tot > 0 && (num / tot) >= 0.6) money.add(c);
          }
        }
        return money;
      }

      function findHeaderIndex(headerLower, cands) {
        for (const c of cands) {
          const lc = c.toLowerCase();
          const idx = headerLower.findIndex(h => h === lc || (h && h.includes(lc)));
          if (idx !== -1) return idx;
        }
        return -1;
      }

      async function createStyledPdf(header, rows, opts = {}) {
        const { orientation = 'landscape', paper = 'letter', marginPt = 18, baseFontSize = 10, minFontSize = 6 } = opts;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation, unit: 'pt', format: paper });
        doc.setFont('helvetica');

        const pw = doc.internal.pageSize.getWidth();
        const usableW = pw - (marginPt * 2);
        const numCols = header.length;
        const numericCol = new Array(numCols).fill(false);

        for (let c = 0; c < numCols; c++) {
          let numericCount = 0, totalCount = 0;
          for (let r = 0; r < Math.min(rows.length, 80); r++) {
            const v = rows[r][c];
            if (v === undefined || v === null || String(v).trim() === '') continue;
            totalCount++;
            if (!isNaN(parseNumeric(v))) numericCount++;
          }
          if (totalCount > 0 && (numericCount / totalCount) >= 0.6) numericCol[c] = true;
          const h = String(header[c] || '').toLowerCase();
          if (h.includes('total') || h.includes('ext') || h.includes('amount') || h.includes('$') || h.includes('grand')) numericCol[c] = true;
        }

        doc.setFontSize(baseFontSize);
        function measure(txt) {
          try { return doc.getTextWidth(String(txt)); }
          catch (e) { return String(txt).length * (baseFontSize * 0.5); }
        }

        const maxWidths = new Array(numCols).fill(0);
        for (let c = 0; c < numCols; c++) maxWidths[c] = Math.max(maxWidths[c], measure(header[c] || ''));
        for (let r = 0; r < Math.min(rows.length, 400); r++) {
          for (let c = 0; c < numCols; c++) {
            const cell = rows[r][c] !== undefined && rows[r][c] !== null ? String(rows[r][c]) : '';
            maxWidths[c] = Math.max(maxWidths[c], measure(cell));
          }
        }

        const paddedWidths = maxWidths.map(w => Math.max(30, w + 12));
        const totalNatural = paddedWidths.reduce((a, b) => a + b, 0) || 1;
        const hScale = Math.min(1, usableW / totalNatural);
        const fontSize = Math.max(minFontSize, Math.floor(baseFontSize * hScale));

        let colWidths = paddedWidths.map(w => Math.floor(w * hScale));
        let assigned = colWidths.reduce((a, b) => a + b, 0);
        let leftover = Math.round(usableW - assigned);
        let ci = 0;
        while (leftover > 0) {
          colWidths[ci % numCols] += 1;
          leftover--;
          ci++;
        }

        const head = [header.map(h => String(h || ''))];
        const body = rows.map(r => r.map(c => c === undefined || c === null ? '' : String(c)));
        const columnStyles = {};
        for (let i = 0; i < numCols; i++) {
          columnStyles[i] = { cellWidth: colWidths[i], halign: numericCol[i] ? 'right' : 'left', valign: 'middle' };
        }

        doc.autoTable({
          head,
          body,
          startY: marginPt,
          margin: { left: marginPt, right: marginPt },
          styles: {
            font: 'helvetica',
            fontSize,
            cellPadding: 4,
            overflow: 'linebreak',
            valign: 'middle'
          },
          headStyles: {
            fillColor: [245, 245, 245],
            textColor: 20,
            fontStyle: 'bold',
            halign: 'left'
          },
          alternateRowStyles: { fillColor: [250, 250, 250] },
          theme: 'grid',
          columnStyles,
          tableWidth: 'auto',
          showHead: 'everyPage'
        });

        const pdfBytes = doc.output('arraybuffer');
        return new Blob([pdfBytes], { type: 'application/pdf' });
      }

      async function buildGroupPdfs(workbook) {
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        if (!sheet) throw new Error('Sheet missing.');
        const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: false });
        if (!aoa || aoa.length === 0) throw new Error('Sheet empty.');

        const header = aoa[0].map(c => c == null ? '' : String(c));
        let lastRow = aoa.length;
        if (sheet['!ref']) {
          try {
            const rng = XLSX.utils.decode_range(sheet['!ref']);
            lastRow = rng.e.r + 1;
          } catch (e) {}
        }

        const boundaries = [];
        let sawStyle = false;
        for (let r = 2; r <= lastRow; r++) {
          const Ac = sheet['A' + r], Bc = sheet['B' + r], Cc = sheet['C' + r], Dc = sheet['D' + r], Ec = sheet['E' + r];
          const bBlank = isBlank(Bc), cBlank = isBlank(Cc), dBlank = isBlank(Dc), eBlank = isBlank(Ec);
          const boldA = cellBold(Ac);
          if (boldA) sawStyle = true;
          const aHas = !isBlank(Ac);
          let isBoundary = false;
          if (boldA && bBlank && cBlank && dBlank && eBlank) isBoundary = true;
          else if (!sawStyle && aHas && bBlank && cBlank && dBlank && eBlank) isBoundary = true;
          if (isBoundary) boundaries.push(r);
        }

        const groups = [];
        if (boundaries.length > 0) {
          let start = 2;
          for (const br of boundaries) {
            const end = br;
            if (start <= end) groups.push({ from: start, to: end });
            start = end + 1;
          }
          if (start <= lastRow) groups.push({ from: start, to: lastRow });
        } else {
          const starts = [];
          for (let r = 2; r <= lastRow; r++) if (!isBlank(sheet['A' + r])) starts.push(r);
          if (starts.length === 0) {
            if (lastRow >= 2) groups.push({ from: 2, to: lastRow });
          } else {
            for (let i = 0; i < starts.length; i++) {
              const s = starts[i];
              const e = (i + 1 < starts.length) ? starts[i + 1] - 1 : lastRow;
              groups.push({ from: s, to: e });
            }
          }
        }

        if (groups.length === 0) throw new Error('No groups found.');

        const moneyCols = detectMoneyCols(header, aoa);
        const headerLower = header.map(h => String(h || '').toLowerCase());
        const costCenterIdx = findHeaderIndex(headerLower, ['cost center', 'cost_center', 'costcenter']);
        const totalIdx = findHeaderIndex(headerLower, ['ext $', 'ext', 'total', 'line total', 'amount', 'unit $', 'unit$']);
        const masterIdx = findHeaderIndex(headerLower, ['master inv nbr', 'master inv number', 'master inv', 'master_inv_nbr', 'masterinvoice', 'master invoice', 'master']);

        const allTotals = new Map();
        const transportTotals = new Map();
        for (let r = 2; r <= lastRow; r++) {
          const row = aoa[r - 1] || [];
          const cc = (costCenterIdx >= 0) ? (row[costCenterIdx] || 'UNSPECIFIED') : 'UNSPECIFIED';
          const ccKey = String(cc).trim() || 'UNSPECIFIED';

          let totalC = null;
          if (totalIdx >= 0) totalC = toCents(row[totalIdx]);
          else {
            for (const mi of moneyCols) {
              const cval = toCents(row[mi]);
              if (cval !== null) { totalC = cval; break; }
            }
          }
          if (totalC !== null) allTotals.set(ccKey, (allTotals.get(ccKey) || 0) + totalC);

          const catalogVal = row[0];
          const unitVal = row[2] !== undefined ? String(row[2]).trim() : '';
          const catalogBlank = (catalogVal == null || String(catalogVal).trim() === '');
          const unitEA = unitVal.toUpperCase() === 'EA';
          if (catalogBlank && unitEA) {
            let transportC = totalC;
            if (transportC === null) {
              for (const mi of moneyCols) {
                const cval = toCents(row[mi]);
                if (cval !== null) { transportC = cval; break; }
              }
            }
            if (transportC !== null) transportTotals.set(ccKey, (transportTotals.get(ccKey) || 0) + transportC);
          }
        }

        const pdfs = [];

        for (let gi = 0; gi < groups.length; gi++) {
          const g = groups[gi];
          setStatus(`Building grouped PDFs (${gi + 1}/${groups.length})...`);
          setProgress(35 + Math.round((gi / Math.max(1, groups.length)) * 30));

          const firstRow = aoa[g.from - 1] || [];
          let masterVal = '';
          if (masterIdx >= 0) masterVal = firstRow[masterIdx];
          if (!masterVal) masterVal = firstRow[0];
          let safeMaster = sanitize(masterVal || '');
          if (!safeMaster) safeMaster = `rows_${g.from}-${g.to}`;

          let costCenterVal = 'UNSPECIFIED';
          if (costCenterIdx >= 0) {
            const v = firstRow[costCenterIdx];
            if (v) costCenterVal = v;
          }
          let safeCC = sanitize(costCenterVal || '');
          if (!safeCC) safeCC = 'UNSPECIFIED';

          const rowsForPdf = [];
          for (let r = g.from; r <= g.to; r++) {
            const row = aoa[r - 1] || [];
            const out = [];
            for (let c = 0; c < header.length; c++) {
              const raw = row[c];
              out.push(raw === undefined || raw === null ? '' : String(raw));
            }
            rowsForPdf.push(out);
          }

          const pdfBlob = await createStyledPdf(header.map(h => h || ''), rowsForPdf, {
            orientation: 'landscape',
            paper: 'letter',
            marginPt: 18,
            baseFontSize: 10,
            minFontSize: 6
          });
          const fname = `RGNBillingRpt_${safeMaster}_${safeCC}.pdf`;
          pdfs.push({ filename: fname, blob: pdfBlob });
        }

        return pdfs;
      }

      async function mergePdfsByCore(coverPdfs, groupPdfs) {
        const all = [...coverPdfs, ...groupPdfs];
        const grouped = new Map();

        function extractCore(fn) {
          const base = fn.replace(/^.*[\\/]/, '').replace(/\.[^.]+$/, '');
          const m = base.match(/^[^_]+_([^_]+)_/);
          return m ? m[1] : null;
        }

        function normalize(fn) {
          return fn.toLowerCase().replace(/\.[^.]+$/, '').replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
        }

        function fuzzyMatch(a, b) {
          const na = normalize(a), nb = normalize(b);
          return na === nb || na.includes(nb) || nb.includes(na);
        }

        function filenamesMatch(a, b) {
          const ca = extractCore(a), cb = extractCore(b);
          if (ca && cb) return ca.toLowerCase() === cb.toLowerCase();
          return fuzzyMatch(a, b);
        }

        for (const e of all) {
          let key = null;
          for (const existing of grouped.keys()) {
            if (filenamesMatch(existing, e.filename)) {
              key = existing;
              break;
            }
          }
          if (!key) key = extractCore(e.filename) || normalize(e.filename);
          if (!grouped.has(key)) grouped.set(key, []);
          grouped.get(key).push(e);
        }

        const entries = [];
        const keys = Array.from(grouped.keys()).sort();
        let mergedCount = 0;

        for (const key of keys) {
          const docs = grouped.get(key).slice().sort((a, b) => (/filled_invoices/i.test(a.filename) ? 0 : 1) - (/filled_invoices/i.test(b.filename) ? 0 : 1));
          const merged = await PDFLib.PDFDocument.create();
          for (const d of docs) {
            const src = await PDFLib.PDFDocument.load(await d.blob.arrayBuffer());
            const pages = await merged.copyPages(src, src.getPageIndices());
            pages.forEach(p => merged.addPage(p));
          }
          const bytes = await merged.save();
          entries.push({ filename: `Invoice_${key}.pdf`, bytes });
          mergedCount++;
        }

        return { entries, mergedCount };
      }

      async function runWorkflow() {
        if (!excelEl.files.length) return;

        const excelFile = excelEl.files[0];
        const startDate = startEl.value.trim();
        const invoiceDate = invoiceEl.value.trim();

        runBtn.disabled = true;
        setProgress(5);
        setStatus('Reading workbook...');

        try {
          const workbook = await readWorkbook(excelFile);
          const baseName = fileBaseName(excelFile.name);

          setStatus('Building transportation summary...');
          const step1 = buildTransportationSummary(workbook);
          setProgress(16);

          const manifestPdfBlob = generateManifestPdf(step1.summary, baseName);
          const manifestPdfName = `${baseName}_Manifest.pdf`;
          setProgress(24);

          setStatus('Filling cover page PDFs...');
          const templateBytes = pdfEl.files.length
            ? await pdfEl.files[0].arrayBuffer()
            : base64ToArrayBuffer(EMBEDDED_TEMPLATE_B64);
          const coverEntries = await buildCoverPages(step1.summary, templateBytes, startDate, invoiceDate);
          setProgress(45);

          setStatus('Building grouped billing PDFs...');
          const groupEntries = await buildGroupPdfs(workbook);
          setProgress(70);

          setStatus('Merging cover pages with billing reports...');
          const merged = await mergePdfsByCore(coverEntries, groupEntries);
          setProgress(88);

          setStatus('Packaging final ZIP...');
          const finalZip = new JSZip();
          finalZip.file(manifestPdfName, manifestPdfBlob);
          const invoicesFolder = finalZip.folder('Invoices');
          for (const e of merged.entries) invoicesFolder.file(e.filename, e.bytes);

          const finalBlob = await finalZip.generateAsync({ type: 'blob' });
          const finalName = `${baseName}_billing_output.zip`;
          makeDownload(finalBlob, finalName);
          setProgress(100);
          setStatus(`Done. Downloaded ${finalName} — contains ${manifestPdfName} plus ${merged.entries.length} invoice PDFs in the Invoices folder.`, 'success');
        } catch (err) {
          console.error(err);
          setProgress(0);
          setStatus('Error: ' + (err && err.message ? err.message : String(err)), 'error');
        } finally {
          runBtn.disabled = false;
        }
      }

      excelEl.addEventListener('change', enableRun);
      pdfEl.addEventListener('change', enableRun);
      runBtn.addEventListener('click', runWorkflow);
      clearBtn.addEventListener('click', clearAll);

      clearAll();
    })();
  </script>
</body>
